<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <g id="bg">
    <rect width="512" height="512" fill="#111111"/>
  </g>

  <g id="seal">
    <!-- Outer thick ring -->
    <circle cx="256" cy="256" r="230" fill="#D97706"/>
    <circle cx="256" cy="256" r="196" fill="#111111"/>
    <!-- Inner ring border -->
    <circle cx="256" cy="256" r="186" fill="#D97706"/>
    <circle cx="256" cy="256" r="160" fill="#111111"/>
  </g>

  <g id="nib">
    <!-- Main quill nib body: trapezoid (wider top, narrower bottom) -->
    <!-- Trapezoid: top-left, top-right, bottom-right, bottom-left -->
    <polygon points="256,320 204,168 308,168" fill="#D97706"/>

    <!-- Nib tip triangle (sharp point downward) -->
    <polygon points="256,360 232,310 280,310" fill="#D97706"/>

    <!-- Center split cutout: thin vertical line down nib -->
    <polygon points="256,355 249,290 263,290" fill="#111111"/>

    <!-- Upper nib shoulder cutout left -->
    <polygon points="212,178 226,178 236,240 218,240" fill="#111111"/>

    <!-- Upper nib shoulder cutout right -->
    <polygon points="300,178 286,178 276,240 294,240" fill="#111111"/>

    <!-- Nib cap / ferrule: horizontal rectangle across top of nib -->
    <rect x="196" y="152" width="120" height="28" rx="6" fill="#D97706"/>

    <!-- Ferrule cutout detail -->
    <rect x="212" y="160" width="88" height="12" rx="3" fill="#111111"/>
  </g>

</svg>
