<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <g id="bg">
    <rect width="512" height="512" fill="#111111"/>
  </g>

  <!-- A shape: two solid teal diagonal legs with flat truncated apex -->
  <!-- Left leg: from ~(210,100) to ~(80,430) with width ~60px -->
  <!-- Right leg: from ~(302,100) to ~(432,430) with width ~60px -->
  <!-- Apex: flat truncated top connecting both legs -->
  <!-- Full A silhouette as single solid path, interior triangle cut out as background color -->
  <g id="a-shape">
    <!-- Outer silhouette of A shape (solid teal) -->
    <path d="
      M 210,100
      L 302,100
      L 432,430
      L 370,430
      L 256,140
      L 142,430
      L 80,430
      Z
    " fill="#0D9488"/>

    <!-- Interior triangle cutout (negative space between legs) -->
    <path d="
      M 256,175
      L 390,410
      L 122,410
      Z
    " fill="#111111"/>
  </g>

  <!-- Crossbar zone: y=280–350, amber horizontal text lines -->
  <!-- Lines cut across both legs at crossbar level -->
  <!-- Three amber rects, full width of A at that y level, 10px tall, 18px apart -->
  <!-- At y=288: left edge of A ~163, right edge ~349 -->
  <!-- At y=306: left edge ~157, right edge ~355 -->
  <!-- At y=324: left edge ~151, right edge ~361 -->
  <!-- Using consistent full crossbar width for clean text-line appearance -->
  <g id="text-lines">
    <rect x="148" y="285" width="216" height="10" fill="#D97706"/>
    <rect x="144" y="303" width="224" height="10" fill="#D97706"/>
    <rect x="140" y="321" width="232" height="10" fill="#D97706"/>
  </g>

</svg>
