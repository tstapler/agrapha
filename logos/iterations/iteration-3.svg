<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <g id="bg">
    <rect x="0" y="0" width="512" height="512" fill="#111111"/>
  </g>

  <g id="bars" fill="#0D9488">
    <!-- Bar 1: apex/top, width=60, centered x=256, y=89 -->
    <rect x="226" y="89" width="60" height="30"/>

    <!-- Bar 2: width=100, y=89+30+8=127 -->
    <rect x="206" y="127" width="100" height="30"/>

    <!-- Bar 3: width=145, y=127+30+8=165 -->
    <rect x="183.5" y="165" width="145" height="30"/>

    <!-- Bar 4: shoulders, width=190, y=165+30+8=203 -->
    <rect x="161" y="203" width="190" height="30"/>

    <!-- Bar 5: crossbar zone - two rects with 60px gap center, total span=160px (two 50px rects + 60 gap) -->
    <!-- Left rect: from 256-30-50=176 to 226, width=50 -->
    <!-- Right rect: from 256+30=286 to 336, width=50 -->
    <rect x="176" y="241" width="50" height="30"/>
    <rect x="286" y="241" width="50" height="30"/>

    <!-- Bar 6: width=225, y=241+30+8=279 -->
    <rect x="143.5" y="279" width="225" height="30"/>

    <!-- Bar 7: width=265, y=279+30+8=317 -->
    <rect x="123.5" y="317" width="265" height="30"/>

    <!-- Bar 8: width=305, y=317+30+8=355 -->
    <rect x="103.5" y="355" width="305" height="30"/>

    <!-- Bar 9: feet - split two rects with ~120px center gap, total span=350px -->
    <!-- Left foot: 256-60-115=81 to 81+115=196, width=115 -->
    <!-- Right foot: 256+60=316 to 316+115=431, width=115 -->
    <rect x="83.5" y="393" width="115" height="30"/>
    <rect x="313.5" y="393" width="115" height="30"/>
  </g>

</svg>
